<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vegas Royale Slot | Telegram Web App</title>
  <meta name="description" content="Slot machine estilo Las Vegas con efectos de partículas y sonido inmersivo." />
  <link rel="stylesheet" href="/static/assets/css/casino.css" />
  <script defer src="https://telegram.org/js/telegram-web-app.js"></script>
  <script defer src="/static/assets/js/animations.js"></script>
  <script defer src="/static/assets/js/game.js"></script>
</head>
<body>
  <canvas id="particles" aria-hidden="true"></canvas>
  <div class="bg-layer" aria-hidden="true"></div>

  <header class="site-header fade-in">
    <a class="back-link" href="/">← Lobby</a>
    <h1 class="neon-logo" data-animate="flash">VEGAS ROYALE</h1>
    <p class="subtitle">Neon Slots Experience</p>
  </header>

  <main class="casino-main">
    <section class="slot-board gold-frame bounce-in" aria-label="Slot machine">
      <div class="board-lights" aria-hidden="true"></div>
      <div class="reels-wrapper">
        <div class="reel" data-reel="0"><span class="symbol">🎰</span></div>
        <div class="reel" data-reel="1"><span class="symbol">💎</span></div>
        <div class="reel" data-reel="2"><span class="symbol">🍒</span></div>
      </div>

      <p class="result-message" aria-live="polite">Pulsa para girar</p>

      <div class="controls">
        <button id="spinBtn" class="btn-3d btn-primary" type="button">GIRAR</button>
        <button id="musicBtn" class="btn-3d btn-secondary" type="button">Música: OFF</button>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <small>Optimizado para Telegram Web App • Vibración y feedback háptico al ganar</small>
  </footer>
</body>
</html>
