<!DOCTYPE html>
<html lang="es">
<head>
    <!-- ======================================================
         META & SEO AVANZADO
    ======================================================= -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0b0f14">
    <meta name="description" content="Slot Machine premium del Casino Estrella. Disfruta animaciones 3D fluidas y una experiencia de casino digital de alto nivel.">
    <meta name="robots" content="index, follow">

    <title>Slot Machine | Casino Estrella</title>

    <!-- Performance -->
    <link rel="preload" href="{{ url_for('static', filename='style.css') }}" as="style">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- JS -->
    <script defer src="{{ url_for('static', filename='slotmachine.js') }}"></script>
</head>

<body class="slot-page">

    <!-- ======================================================
         ACCESSIBILITY
    ======================================================= -->
    <a href="#main-content" class="skip-link">
        Saltar al contenido principal
    </a>

    <!-- ======================================================
         HEADER
    ======================================================= -->
    <header class="slot-header" role="banner">
        <div class="container slot-header-container">

            <a href="{{ url_for('home') }}" class="brand-mini" aria-label="Volver al inicio">
                🎰 <span>Casino Estrella</span>
            </a>

            <div class="slot-header-info">
                <h1 class="slot-title">
                    <span class="gradient-text">Slot Machine</span>
                </h1>
                <p class="slot-subtitle">
                    Vive la experiencia premium y prueba tu suerte
                </p>
            </div>

        </div>
    </header>

    <!-- ======================================================
         MAIN GAME AREA
    ======================================================= -->
    <main id="main-content" class="slot-main" role="main">

        <section 
            class="slot-machine"
            aria-labelledby="slot-heading"
        >

            <!-- Heading accesible invisible -->
            <h2 id="slot-heading" class="visually-hidden">
                Máquina tragamonedas interactiva
            </h2>

            <!-- ==================================================
                 REELS CONTAINER (3D READY)
            =================================================== -->
            <div 
                class="reels"
                role="group"
                aria-label="Rodillos de la máquina tragamonedas"
            >

                <div class="reel" data-reel="1">
                    <div class="reel-track">
                        <span class="symbol">🍒</span>
                    </div>
                </div>

                <div class="reel" data-reel="2">
                    <div class="reel-track">
                        <span class="symbol">🍋</span>
                    </div>
                </div>

                <div class="reel" data-reel="3">
                    <div class="reel-track">
                        <span class="symbol">🍊</span>
                    </div>
                </div>

            </div>

            <!-- ==================================================
                 CONTROLS
            =================================================== -->
            <div 
                class="controls"
                role="group"
                aria-label="Controles de la tragamonedas"
            >

                <button 
                    class="btn btn-primary spin-button"
                    type="button"
                    data-action="spin"
                >
                    🎮 Girar
                </button>

                <button 
                    class="btn btn-secondary"
                    type="button"
                    data-action="navigate"
                    data-url="{{ url_for('home') }}"
                >
                    🏠 Volver al Inicio
                </button>

            </div>

            <!-- ==================================================
                 RESULT AREA
            =================================================== -->
            <div 
                class="result-container"
                role="status"
                aria-live="polite"
                aria-atomic="true"
            >
                <p class="result-message"></p>
            </div>

        </section>

    </main>

    <!-- ======================================================
         FOOTER
    ======================================================= -->
    <footer class="slot-footer" role="contentinfo">
        <div class="container">
            <p>
                © 2026 Casino Estrella — Plataforma Premium
            </p>
        </div>
    </footer>

</body>
</html>
