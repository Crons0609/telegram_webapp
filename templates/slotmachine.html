<!DOCTYPE html>
<html lang="es">

<head>
  <!-- ======================================================
       META & SEO
  ======================================================= -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="description"
    content="Slot Machine premium del Casino Ghost Plague 777. Rodillos 3D fluidos y experiencia de casino de alto nivel.">
  <title>Slot Machine | Ghost Plague Casino</title>

  <!-- Preconnect & Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="/static/js/firebase.js"></script>

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>try{var t=localStorage.getItem("casino_theme");if(t)document.documentElement.setAttribute("data-casino-theme",t);}catch(e){}</script>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="/static/css/slot.css">
  <link rel="stylesheet" href="/static/css/perfil.css">
    <link rel="stylesheet" href="/static/css/loading-screen.css">
    <script src="/static/js/loading-screen.js"></script>
</head>

<body class="slot-page">
  <div class="slot-dynamic-bg"></div>

  <!-- ======================================================
       HEADER
  ======================================================= -->
  <header class="slot-header" role="banner">
    <div class="slot-header-container">
      <a href="{{ url_for('home') }}" class="btn-back-slot">
        <span>🏠</span> Lobby
      </a>

      <div class="slot-header-info">
        <h1 class="slot-title">
          <span class="gradient-text">SLOT 777</span>
        </h1>
        <p class="slot-subtitle">Rueda los cilindros · Vive el jackpot</p>
        <div style="margin-top: 12px; display: flex; align-items: center; justify-content: center;">
          {% include 'user_menu.html' %}
        </div>
      </div>
    </div>
  </header>

  <!-- ======================================================
       MAIN GAME AREA
  ======================================================= -->
  <main id="main-content" class="slot-main" role="main">

    <section class="slot-machine" aria-labelledby="slot-heading">
      <h2 id="slot-heading" class="visually-hidden">Máquina tragamonedas interactiva</h2>

      <div class="slot-cabine">

        <!-- REELS CONTAINER -->
        <div class="slot-screen-glass">
          <div class="led-lights" aria-hidden="true"></div>
          <div class="reels" role="group" aria-label="Rodillos de la máquina">
            <div class="payline" aria-hidden="true"></div>

            <div class="reel" data-reel="1">
              <div class="reel-shadow-top"></div>
              <div class="reel-track"></div>
              <div class="reel-shadow-bottom"></div>
            </div>
            <div class="reel" data-reel="2">
              <div class="reel-shadow-top"></div>
              <div class="reel-track"></div>
              <div class="reel-shadow-bottom"></div>
            </div>
            <div class="reel" data-reel="3">
              <div class="reel-shadow-top"></div>
              <div class="reel-track"></div>
              <div class="reel-shadow-bottom"></div>
            </div>
            <div class="reel" data-reel="4">
              <div class="reel-shadow-top"></div>
              <div class="reel-track"></div>
              <div class="reel-shadow-bottom"></div>
            </div>
            <div class="reel" data-reel="5">
              <div class="reel-shadow-top"></div>
              <div class="reel-track"></div>
              <div class="reel-shadow-bottom"></div>
            </div>
          </div>
        </div>

        <!-- COIN DISPENSER TRAY -->
        <div class="coin-dispenser" id="coin-dispenser" aria-hidden="true">
          <div class="dispenser-outlet">
            <div class="dispenser-slot"></div>
          </div>
          <div class="coin-tray" id="coin-tray">
            <span class="tray-label">PRIZE TRAY</span>
          </div>
        </div>

        <!-- CONTROLS -->
        <div class="controls" role="group" aria-label="Controles de la tragamonedas">
          <div class="bet-controls">
            <button class="btn bet-btn-circle" id="btn-decrease" data-action="decrease-bet"
              aria-label="Reducir apuesta">−</button>

            <div class="bet-display">
              <span class="bet-label-text">APUESTA</span>
              <input type="number" id="bet-amount" class="bet-input-clean" value="10" min="10" step="10"
                aria-label="Cantidad a apostar" readonly>
              <span class="bet-unit-text">bits</span>
            </div>

            <button class="btn bet-btn-circle" id="btn-increase" data-action="increase-bet"
              aria-label="Aumentar apuesta">+</button>
          </div>

          <div class="action-controls">
            <button class="btn btn-primary spin-button" type="button" data-action="spin" id="spin-btn">
              <span class="spin-icon">🎰</span>
              <span id="spin-label">GIRAR</span>
            </button>
          </div>
        </div>
      </div><!-- /slot-cabine -->

      <!-- RESULT AREA -->
      <div class="result-container" role="status" aria-live="polite" aria-atomic="true">
        <p class="result-message"></p>
      </div>

    </section>

  </main>

  <!-- ======================================================
       FOOTER
  ======================================================= -->
  <footer class="slot-footer" role="contentinfo">
    <div class="container">
      <p>© 2026 Ghost Plague Casino — Plataforma Premium Internacional</p>
    </div>
  </footer>

  <!-- ================= PROFILE MODAL ================= -->
  <div id="profile-modal" class="modal-overlay hidden">
    <div class="modal-content profile-content">
      <header class="modal-header">
        <h2 style="color: #c9a227;">Perfil del Jugador</h2>
        <button class="btn-close" onclick="UserProfileManager.closeModal()">×</button>
      </header>
      <div class="modal-body" id="profile-content-area">
        <!-- Inyectado dinámicamente -->
      </div>
    </div>
  </div>

  <!-- Seed bits immediately from Flask so JS doesn't need to wait for perfil.js -->
  <script>window.INITIAL_BITS = {{ bits | int }};</script>

  <!-- Scripts -->
  <script src="/static/js/theme-manager.js"></script>
  <script defer src="/static/js/soundManager.js"></script>
  <script defer src="/static/js/perfil.js"></script>
  <script defer src="/static/js/slotmachine.js"></script>
</body>

</html>
