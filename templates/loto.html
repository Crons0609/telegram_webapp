<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <meta name="theme-color" content="#0b0614">

        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Orbitron:wght@700;900&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --loto-gold: #f8d448;
            --loto-purple: #9b30ff;
            --loto-blue: #00c8ff;
            --loto-bg: #0b0614;
            --loto-panel: rgba(15, 10, 35, 0.92);
            --loto-glass: rgba(255, 255, 255, 0.06);
            --loto-border: rgba(155, 48, 255, 0.35);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            background: var(--loto-bg);
            font-family: 'Montserrat', sans-serif;
            color: #fff
        }

        /* ── HEADER ── */
        .loto-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: linear-gradient(180deg, rgba(11, 6, 20, .96) 80%, transparent);
        }

        .btn-back {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--loto-glass);
            border: 1px solid var(--loto-border);
            color: #fff;
            font-size: .85rem;
            font-weight: 600;
            padding: 7px 14px;
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
            transition: background .2s;
        }

        .btn-back:hover {
            background: rgba(155, 48, 255, .25)
        }

        .loto-title-wrap {
            text-align: center
        }

        .loto-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 900;
            background: linear-gradient(90deg, var(--loto-purple), var(--loto-blue));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }

        .loto-subtitle {
            font-size: .65rem;
            color: rgba(255, 255, 255, .5);
            letter-spacing: .08em;
            text-transform: uppercase
        }

        .bits-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--loto-glass);
            border: 1px solid rgba(248, 212, 72, .35);
            padding: 7px 12px;
            border-radius: 20px;
            font-size: .85rem;
            font-weight: 700;
            color: var(--loto-gold);
        }

        /* ── CANVAS ── */
        #loto-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
        }

        /* ── SPHERES LABEL ── */
        .sphere-labels {
            position: fixed;
            top: 58px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            pointer-events: none;
            z-index: 50;
            padding: 0 12%;
        }

        .sphere-label {
            font-family: 'Orbitron', sans-serif;
            font-size: .7rem;
            font-weight: 700;
            color: rgba(255, 255, 255, .55);
            letter-spacing: .12em;
            text-transform: uppercase;
            text-shadow: 0 0 12px var(--loto-purple);
        }

        /* ── DIGIT DISPLAY ── */
        .digit-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 12px;
            align-items: center;
            pointer-events: none;
            z-index: 60;
            opacity: 0;
            transition: opacity .4s;
        }

        .digit-display.visible {
            opacity: 1
        }

        .digit-box {
            width: 64px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, .6);
            border: 2px solid var(--loto-border);
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--loto-gold);
            text-shadow: 0 0 20px var(--loto-gold);
            box-shadow: inset 0 0 20px rgba(155, 48, 255, .2), 0 0 30px rgba(155, 48, 255, .3);
            transition: all .3s;
        }

        .digit-box.lit {
            border-color: var(--loto-gold);
            box-shadow: inset 0 0 30px rgba(248, 212, 72, .25), 0 0 40px rgba(248, 212, 72, .5);
        }

        .digit-sep {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            color: rgba(255, 255, 255, .3)
        }

        /* ── BOTTOM PANEL ── */
        .bottom-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: linear-gradient(0deg, rgba(11, 6, 20, .98) 70%, transparent);
            padding: 16px 20px 24px;
        }

        /* Number selector */
        .number-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 14px;
        }

        .digit-picker {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .digit-picker label {
            font-size: .65rem;
            color: rgba(255, 255, 255, .45);
            letter-spacing: .1em;
            text-transform: uppercase
        }

        .picker-row {
            display: flex;
            align-items: center;
            gap: 8px
        }

        .picker-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 1px solid var(--loto-border);
            background: var(--loto-glass);
            color: #fff;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .15s;
        }

        .picker-btn:active {
            background: rgba(155, 48, 255, .4)
        }

        .picker-val {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            min-width: 44px;
            text-align: center;
            color: var(--loto-gold);
            text-shadow: 0 0 15px rgba(248, 212, 72, .6);
        }

        .number-preview {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: rgba(255, 255, 255, .4);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .number-preview span {
            font-size: .6rem;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .3)
        }

        /* Bet row */
        .bet-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .bet-label {
            font-size: .7rem;
            color: rgba(255, 255, 255, .5);
            white-space: nowrap
        }

        .bet-chips {
            display: flex;
            gap: 6px;
            flex: 1;
            justify-content: center;
            flex-wrap: wrap
        }

        .chip-btn {
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--loto-border);
            background: var(--loto-glass);
            color: #fff;
            font-size: .75rem;
            font-weight: 700;
            cursor: pointer;
            transition: all .15s;
        }

        .chip-btn.active,
        .chip-btn:active {
            background: linear-gradient(135deg, var(--loto-purple), #6a0fd9);
            border-color: var(--loto-purple);
            box-shadow: 0 0 12px rgba(155, 48, 255, .5);
        }

        /* Play button */
        .play-btn {
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, #7c1fff, #00c8ff);
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 900;
            color: #fff;
            cursor: pointer;
            letter-spacing: .08em;
            box-shadow: 0 4px 24px rgba(124, 31, 255, .5);
            transition: all .2s;
            position: relative;
            overflow: hidden;
        }

        .play-btn:disabled {
            opacity: .5;
            cursor: not-allowed
        }

        .play-btn:not(:disabled):active {
            transform: scale(.97)
        }

        .play-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, .15), transparent);
            border-radius: inherit;
        }

        /* ── RESULT OVERLAY ── */
        #result-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, .75);
            backdrop-filter: blur(8px);
            opacity: 0;
            pointer-events: none;
            transition: opacity .4s;
        }

        #result-overlay.visible {
            opacity: 1;
            pointer-events: all
        }

        .result-badge {
            font-family: 'Orbitron', sans-serif;
            font-size: 5rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 12px;
        }

        .result-badge.win {
            color: var(--loto-gold);
            text-shadow: 0 0 40px rgba(248, 212, 72, .8), 0 0 80px rgba(248, 212, 72, .4);
        }

        .result-badge.lose {
            color: rgba(255, 255, 255, .7);
            text-shadow: none
        }

        .result-title {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 6px
        }

        .result-sub {
            font-size: .85rem;
            color: rgba(255, 255, 255, .6);
            margin-bottom: 24px
        }

        .result-win-amount {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--loto-gold);
            margin-bottom: 24px
        }

        .result-actions {
            display: flex;
            gap: 12px
        }

        .result-btn {
            padding: 12px 28px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: .9rem;
            cursor: pointer;
            transition: all .15s;
        }

        .result-btn.primary {
            background: linear-gradient(135deg, var(--loto-purple), #00c8ff);
            color: #fff;
            box-shadow: 0 4px 20px rgba(155, 48, 255, .4);
        }

        .result-btn.secondary {
            background: var(--loto-glass);
            border: 1px solid var(--loto-border);
            color: #fff
        }

        /* ── HISTORY ── */
        .history-strip {
            position: fixed;
            top: 58px;
            right: 12px;
            z-index: 80;
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: flex-end;
        }

        .history-item {
            font-family: 'Orbitron', sans-serif;
            font-size: .65rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 8px;
            background: rgba(0, 0, 0, .6);
            border: 1px solid rgba(255, 255, 255, .1);
            color: rgba(255, 255, 255, .5);
        }

        .history-item.won {
            color: var(--loto-gold);
            border-color: rgba(248, 212, 72, .3)
        }

        /* ── STATUS MSG ── */
        #status-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, 80px);
            z-index: 90;
            font-size: .85rem;
            font-weight: 700;
            background: rgba(0, 0, 0, .7);
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid var(--loto-border);
            opacity: 0;
            transition: opacity .3s;
            pointer-events: none;
            white-space: nowrap;
        }

        #status-msg.visible {
            opacity: 1
        }

        /* ── PROFILE MODAL ── */
        #profile-modal {
            position: fixed;
            inset: 0;
            z-index: 300
        }
    </style>
</head>

    <!-- 2D Canvas Physics Engine (replaces Three.js + Cannon-ES) -->

    <script>
        /* =============================================================
           LOTO INSTANTÁNEO  — Canvas 2D Physics Engine
           No Three.js / Cannon-ES. Uses requestAnimationFrame + simple
           Newtonian 2D simulation inside two circular containers.
           ============================================================= */

        /* =========================================================
           CONSTANTS  (2D world — pixels are logical units)
           ========================================================= */
        const PAYOUT = 75;          // win multiplier

        /* =========================================================
           STATE
           ========================================================= */
        let state = 'IDLE'; // IDLE | MIXING | EXTRACT1 | EXTRACT2 | RESULT
        let betAmount = 25;
        let chosenD1 = 0, chosenD2 = 0;
        let winningResult = '00';
        let winD1 = 0, winD2 = 0;
        let bits = parseInt(document.getElementById('bits-display').textContent) || 0;
        let history = [];
        let data_won = false;

        /* =========================================================
           AUDIO (Web Audio API)
           ========================================================= */
        let audioCtx = null;
        function getAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            return audioCtx;
        }
        function playTone(freq, type, dur, vol = 0.2, delay = 0) {
            try {
                const ctx = getAudio();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.type = type; osc.frequency.value = freq;
                gain.gain.setValueAtTime(vol, ctx.currentTime + delay);
                gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + delay + dur);
                osc.start(ctx.currentTime + delay);
                osc.stop(ctx.currentTime + delay + dur);
            } catch (e) { }
        }
        function playBounce() { playTone(180 + Math.random() * 80, 'triangle', 0.08, 0.06); }
        function playMotor(on) {
            if (on) {
                playTone(60, 'sawtooth', 0.4, 0.08);
                playTone(120, 'sawtooth', 0.4, 0.04, 0.1);
            }
        }
        function playExtract() {
            for (let i = 0; i < 5; i++) playTone(400 + i * 120, 'sine', 0.15, 0.1, i * 0.07);
        }
        function playWin() {
            [523, 659, 784, 1047].forEach((f, i) => playTone(f, 'sine', 0.3, 0.18, i * 0.12));
        }
        function playLose() { playTone(150, 'sawtooth', 0.4, 0.15); }

        /* =========================================================
           CANVAS SETUP
           ========================================================= */
        const canvas = document.getElementById('loto-canvas');
        const ctx2d = canvas.getContext('2d');

        // Logical container radii (in px, set dynamically on resize)
        let W = 0, H = 0;
        let SPHERE_PX = 0;   // visual radius of each sphere
        let BALL_PX = 0;     // ball radius
        let INNER_PX = 0;    // max ball center distance from sphere center
        let sphereCenters = [];  // [{x,y}, {x,y}]

        function onResize() {
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = W * Math.min(devicePixelRatio, 2);
            canvas.height = H * Math.min(devicePixelRatio, 2);
            canvas.style.width = W + 'px';
            canvas.style.height = H + 'px';
            ctx2d.scale(Math.min(devicePixelRatio, 2), Math.min(devicePixelRatio, 2));

            // Sphere radius = 38% of the smaller dimension, capped
            SPHERE_PX = Math.min(W * 0.38, H * 0.26, 180);
            BALL_PX = Math.max(SPHERE_PX * 0.108, 12);
            INNER_PX = SPHERE_PX - BALL_PX - 2;

            const yCenter = H * 0.42;
            const gap = W * 0.08;
            const totalW = 2 * SPHERE_PX * 2 + gap;
            const startX = (W - totalW) / 2 + SPHERE_PX;
            sphereCenters = [
                { x: startX, y: yCenter },
                { x: startX + SPHERE_PX * 2 + gap, y: yCenter }
            ];
            // Reposition balls if they exist
            if (sphereGroups.length) resetBallPositions();
        }
        window.addEventListener('resize', onResize);

        /* =========================================================
           BALL COLORS
           ========================================================= */
        const BALL_COLORS_CSS = [
            '#ff2255', '#ff6600', '#ffcc00', '#22dd44', '#00bbff',
            '#9933ff', '#ff3399', '#00ffcc', '#ff4444', '#44aaff'
        ];

        /* =========================================================
           SPHERE GROUPS — data model
           sphereGroups[i] = {
             cx, cy,             // center from sphereCenters
             balls: [{x,y,vx,vy,digit,color,extracted,winBall}],
             extractBall: null | ball,
             extractPhase: 'idle'|'rising'|'done',
             extractTargetY: 0,
             winDigit: null
           }
           ========================================================= */
        let sphereGroups = [];

        function makeBall(digit, cx, cy) {
            const angle = Math.random() * Math.PI * 2;
            const r = INNER_PX * 0.4 * Math.cbrt(Math.random());
            return {
                digit,
                color: BALL_COLORS_CSS[digit],
                x: cx + r * Math.cos(angle),
                y: cy + r * Math.sin(angle),
                vx: (Math.random() - 0.5) * 120,
                vy: (Math.random() - 0.5) * 120,
                extracted: false,
                winBall: false,
                extractX: 0,
                extractY: 0,
            };
        }

        function buildSphereGroups() {
            sphereGroups = sphereCenters.map(({ x, y }) => {
                const balls = [];
                for (let d = 0; d < 10; d++) balls.push(makeBall(d, x, y));
                return { cx: x, cy: y, balls, extractBall: null, extractPhase: 'idle', winDigit: null };
            });
        }

        function resetBallPositions() {
            sphereGroups.forEach((sg, i) => {
                sg.cx = sphereCenters[i].x;
                sg.cy = sphereCenters[i].y;
                sg.balls.forEach(b => {
                    const angle = Math.random() * Math.PI * 2;
                    const r = INNER_PX * 0.4 * Math.cbrt(Math.random());
                    b.x = sg.cx + r * Math.cos(angle);
                    b.y = sg.cy + r * Math.sin(angle);
                    b.vx = (Math.random() - 0.5) * 120;
                    b.vy = (Math.random() - 0.5) * 120;
                    b.extracted = false;
                    b.winBall = false;
                });
                sg.extractBall = null;
                sg.extractPhase = 'idle';
            });
        }

        /* =========================================================
           PHYSICS UPDATE  (dt in seconds)
           ========================================================= */
        const GRAVITY = 0;           // no gravitypull — blower simulated by impulses
        const SPEED_CAP = 400;       // px/s max
        const DAMPING = 0.998;       // per-frame velocity retention
        let impulseTimer = 0;

        function physicsUpdate(dt) {
            impulseTimer += dt;
            const doImpulse = impulseTimer > 0.18;
            if (doImpulse) impulseTimer = 0;

            sphereGroups.forEach(sg => {
                const { cx, cy, balls } = sg;

                // Blower impulse every ~0.18 s
                if (doImpulse && (state === 'MIXING' || state === 'IDLE')) {
                    balls.forEach(b => {
                        if (b.extracted) return;
                        b.vx += (Math.random() - 0.5) * 160;
                        b.vy += (Math.random() - 0.5) * 160;
                    });
                }

                // Integrate + boundary
                balls.forEach(b => {
                    if (b.extracted) return;
                    b.vx *= DAMPING;
                    b.vy *= DAMPING;

                    // Speed cap
                    const spd = Math.hypot(b.vx, b.vy);
                    if (spd > SPEED_CAP) { b.vx = b.vx / spd * SPEED_CAP; b.vy = b.vy / spd * SPEED_CAP; }

                    b.x += b.vx * dt;
                    b.y += b.vy * dt;

                    // Circular boundary (the sphere wall)
                    const dx = b.x - cx, dy = b.y - cy;
                    const dist = Math.hypot(dx, dy);
                    if (dist > INNER_PX) {
                        const nx = dx / dist, ny = dy / dist;
                        // Push back
                        b.x = cx + nx * INNER_PX;
                        b.y = cy + ny * INNER_PX;
                        // Reflect velocity
                        const dot = b.vx * nx + b.vy * ny;
                        b.vx -= 2 * dot * nx * 0.75;
                        b.vy -= 2 * dot * ny * 0.75;
                        if (Math.abs(dot) > 30) playBounce();
                    }
                });

                // Ball-to-ball elastic collision
                for (let i = 0; i < balls.length; i++) {
                    if (balls[i].extracted) continue;
                    for (let j = i + 1; j < balls.length; j++) {
                        if (balls[j].extracted) continue;
                        const bi = balls[i], bj = balls[j];
                        const dx = bj.x - bi.x, dy = bj.y - bi.y;
                        const dist = Math.hypot(dx, dy);
                        const minDist = BALL_PX * 2;
                        if (dist < minDist && dist > 0.001) {
                            const nx = dx / dist, ny = dy / dist;
                            // Separate
                            const overlap = (minDist - dist) * 0.5;
                            bi.x -= nx * overlap; bi.y -= ny * overlap;
                            bj.x += nx * overlap; bj.y += ny * overlap;
                            // Swap velocity components along normal
                            const dvx = bi.vx - bj.vx, dvy = bi.vy - bj.vy;
                            const dot = dvx * nx + dvy * ny;
                            if (dot > 0) {
                                bi.vx -= dot * nx * 0.8;
                                bi.vy -= dot * ny * 0.8;
                                bj.vx += dot * nx * 0.8;
                                bj.vy += dot * ny * 0.8;
                            }
                        }
                    }
                }
            });
        }

        /* =========================================================
           EXTRACTION ANIMATION
           ========================================================= */
        function chooseWinBall(sgIdx) {
            const sg = sphereGroups[sgIdx];
            const targetDigit = sgIdx === 0 ? winD1 : winD2;
            const pool = sg.balls.filter(b => !b.extracted);
            let chosen = pool.find(b => b.digit === targetDigit) || pool[0];
            if (!chosen) return;
            chosen.extracted = true;
            chosen.winBall = true;
            sg.extractBall = chosen;
            sg.extractPhase = 'rising';
            // Target: above the sphere
            sg.extractTargetX = sg.cx;
            sg.extractTargetY = sg.cy - SPHERE_PX - BALL_PX * 2;
        }

        /* =========================================================
           DRAW ROUTINES
           ========================================================= */
        let animTime = 0;

        function lerp(a, b, t) { return a + (b - a) * t; }

        function drawSphere(sg, idx) {
            const { cx, cy } = sg;
            const R = SPHERE_PX;

            // Rotating glow halo
            const hue = (animTime * 40 + idx * 180) % 360;
            const glow = ctx2d.createRadialGradient(cx, cy, R * 0.4, cx, cy, R * 1.15);
            glow.addColorStop(0, `hsla(${hue},90%,60%,0.0)`);
            glow.addColorStop(0.7, `hsla(${hue},90%,60%,0.06)`);
            glow.addColorStop(1, `hsla(${hue},90%,60%,0.18)`);
            ctx2d.beginPath();
            ctx2d.arc(cx, cy, R * 1.15, 0, Math.PI * 2);
            ctx2d.fillStyle = glow;
            ctx2d.fill();

            // Glass sphere — dark fill
            const bg = ctx2d.createRadialGradient(cx - R * 0.25, cy - R * 0.25, R * 0.1, cx, cy, R);
            bg.addColorStop(0, 'rgba(60,0,100,0.55)');
            bg.addColorStop(1, 'rgba(0,10,40,0.60)');
            ctx2d.beginPath();
            ctx2d.arc(cx, cy, R, 0, Math.PI * 2);
            ctx2d.fillStyle = bg;
            ctx2d.fill();

            // Glass rim
            ctx2d.beginPath();
            ctx2d.arc(cx, cy, R, 0, Math.PI * 2);
            ctx2d.strokeStyle = `rgba(155,48,255,${0.4 + 0.2 * Math.sin(animTime * 3)})`;
            ctx2d.lineWidth = 2.5;
            ctx2d.stroke();

            // Inner specular highlight
            const spec = ctx2d.createRadialGradient(cx - R * 0.3, cy - R * 0.35, 0, cx - R * 0.15, cy - R * 0.2, R * 0.65);
            spec.addColorStop(0, 'rgba(255,255,255,0.18)');
            spec.addColorStop(1, 'rgba(255,255,255,0)');
            ctx2d.beginPath();
            ctx2d.arc(cx, cy, R, 0, Math.PI * 2);
            ctx2d.fillStyle = spec;
            ctx2d.fill();

            // Top tube (extraction nozzle)
            const tubeW = BALL_PX * 1.4;
            const tubeTop = cy - R - BALL_PX * 3;
            const tubeBottom = cy - R + 2;
            const tubeGrad = ctx2d.createLinearGradient(cx - tubeW, tubeTop, cx + tubeW, tubeTop);
            tubeGrad.addColorStop(0, 'rgba(155,48,255,0.5)');
            tubeGrad.addColorStop(0.5, 'rgba(200,200,255,0.2)');
            tubeGrad.addColorStop(1, 'rgba(155,48,255,0.5)');
            ctx2d.beginPath();
            ctx2d.roundRect(cx - tubeW, tubeTop, tubeW * 2, tubeBottom - tubeTop, 4);
            ctx2d.fillStyle = tubeGrad;
            ctx2d.fill();
            ctx2d.strokeStyle = 'rgba(155,48,255,0.7)';
            ctx2d.lineWidth = 1.5;
            ctx2d.stroke();

            // Clip-path for balls: only draw inside sphere
            ctx2d.save();
            ctx2d.beginPath();
            ctx2d.arc(cx, cy, R - 1, 0, Math.PI * 2);
            ctx2d.clip();

            // Draw balls
            sg.balls.forEach(b => {
                if (b.extracted && !b.winBall) return;
                if (b.winBall) return; // drawn separately
                drawBall(b);
            });

            ctx2d.restore();

            // Draw extracting/extracted win ball (above sphere, no clip)
            if (sg.extractBall) drawBall(sg.extractBall);
        }

        function drawBall(b) {
            const r = BALL_PX;
            // Sphere shading
            const grad = ctx2d.createRadialGradient(b.x - r * 0.3, b.y - r * 0.35, r * 0.05, b.x, b.y, r);
            grad.addColorStop(0, lighten(b.color, 0.45));
            grad.addColorStop(0.55, b.color);
            grad.addColorStop(1, darken(b.color, 0.5));
            ctx2d.beginPath();
            ctx2d.arc(b.x, b.y, r, 0, Math.PI * 2);
            ctx2d.fillStyle = grad;
            ctx2d.fill();

            // Number text
            ctx2d.fillStyle = '#fff';
            ctx2d.font = `bold ${Math.round(r * 1.1)}px 'Orbitron', monospace`;
            ctx2d.textAlign = 'center';
            ctx2d.textBaseline = 'middle';
            ctx2d.shadowColor = 'rgba(0,0,0,0.6)';
            ctx2d.shadowBlur = 4;
            ctx2d.fillText(String(b.digit), b.x, b.y + 1);
            ctx2d.shadowBlur = 0;
        }

        // Simple color helpers
        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return [r, g, b];
        }
        function lighten(hex, t) {
            const [r, g, b] = hexToRgb(hex);
            return `rgb(${Math.round(r + (255 - r) * t)},${Math.round(g + (255 - g) * t)},${Math.round(b + (255 - b) * t)})`;
        }
        function darken(hex, t) {
            const [r, g, b] = hexToRgb(hex);
            return `rgb(${Math.round(r * (1 - t))},${Math.round(g * (1 - t))},${Math.round(b * (1 - t))})`;
        }

        /* =========================================================
           DRAWING BACKGROUND
           ========================================================= */
        function drawBackground() {
            ctx2d.fillStyle = '#0b0614';
            ctx2d.fillRect(0, 0, W, H);

            // Subtle starfield (static — only redrawn each frame cheaply with very few dots)
            // Pre-generated at init
        }

        let stars = [];
        function buildStars() {
            stars = [];
            for (let i = 0; i < 60; i++) {
                stars.push({
                    x: Math.random(),
                    y: Math.random(),
                    r: Math.random() * 1.2 + 0.3,
                    a: Math.random() * 0.6 + 0.1,
                    speed: Math.random() * 0.0003 + 0.0001
                });
            }
        }

        function drawStars() {
            stars.forEach(s => {
                s.a = 0.1 + 0.5 * (0.5 + 0.5 * Math.sin(animTime * s.speed * 1000));
                ctx2d.beginPath();
                ctx2d.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
                ctx2d.fillStyle = `rgba(255,255,255,${s.a})`;
                ctx2d.fill();
            });
        }

        /* =========================================================
           EXTRACTION ANIMATION UPDATE
           ========================================================= */
        function updateExtraction(dt, sgIdx) {
            const sg = sphereGroups[sgIdx];
            if (!sg || !sg.extractBall || sg.extractPhase !== 'rising') return false;
            const b = sg.extractBall;
            const spd = 6;
            b.x = lerp(b.x, sg.extractTargetX, spd * dt);
            b.y = lerp(b.y, sg.extractTargetY, spd * dt);
            return Math.abs(b.y - sg.extractTargetY) < 3;
        }

        /* =========================================================
           MAIN STATE MACHINE + RENDER LOOP
           ========================================================= */
        let mixTimer = 0;
        const MIX_DURATION = 5.0;
        let lastTime = null;
        let rafId = null;
        let isVisible = true;

        document.addEventListener('visibilitychange', () => {
            isVisible = !document.hidden;
            if (isVisible && !rafId) rafId = requestAnimationFrame(frame);
        });

        function frame(ts) {
            if (!isVisible && state === 'IDLE') { rafId = requestAnimationFrame(frame); return; }
            rafId = requestAnimationFrame(frame);

            if (lastTime === null) lastTime = ts;
            const rawDt = Math.min((ts - lastTime) / 1000, 0.05);
            lastTime = ts;
            animTime += rawDt;

            // Physics only when needed
            if (state === 'MIXING' || state === 'IDLE') {
                physicsUpdate(rawDt);
            }

            // ── Draw ──
            ctx2d.save();
            ctx2d.setTransform(1, 0, 0, 1, 0, 0);
            ctx2d.scale(Math.min(devicePixelRatio, 2), Math.min(devicePixelRatio, 2));

            drawBackground();
            drawStars();

            sphereGroups.forEach((sg, i) => drawSphere(sg, i));

            ctx2d.restore();

            // ── States ──
            if (state === 'MIXING') {
                mixTimer += rawDt;
                if (mixTimer >= MIX_DURATION) {
                    // Move to EXTRACT1
                    state = 'EXTRACT1';
                    mixTimer = 0;
                    chooseWinBall(0);
                    showStatus('✨ Extrayendo primer dígito...', 0);
                    playExtract();
                }
            } else if (state === 'EXTRACT1') {
                const done = updateExtraction(rawDt, 0);
                if (done && sphereGroups[0].extractPhase === 'rising') {
                    sphereGroups[0].extractPhase = 'done';
                    document.getElementById('digit-1').textContent = String(winD1);
                    document.getElementById('digit-1').classList.add('lit');
                    document.getElementById('digit-display').classList.add('visible');
                    setTimeout(() => {
                        state = 'EXTRACT2';
                        chooseWinBall(1);
                        showStatus('✨ Extrayendo segundo dígito...', 0);
                        playExtract();
                    }, 900);
                }
            } else if (state === 'EXTRACT2') {
                const done = updateExtraction(rawDt, 1);
                if (done && sphereGroups[1].extractPhase === 'rising') {
                    sphereGroups[1].extractPhase = 'done';
                    document.getElementById('digit-2').textContent = String(winD2);
                    document.getElementById('digit-2').classList.add('lit');
                    setTimeout(() => {
                        showResult(winningResult, data_won);
                        state = 'RESULT';
                    }, 900);
                }
            }
        }

        /* =========================================================
           GAME STATE HELPERS
           ========================================================= */
        function updateBitsDisplay() {
            document.getElementById('bits-display').textContent = bits;
            // Also update home screen bits counter if page is shared (it isn't, but just in case)
        }
        function showStatus(msg, dur) {
            const el = document.getElementById('status-msg');
            el.textContent = msg; el.classList.add('visible');
            if (dur > 0) setTimeout(hideStatus, dur);
        }
        function hideStatus() {
            document.getElementById('status-msg').classList.remove('visible');
        }
        function updateChosenDisplay() {
            document.getElementById('chosen-display').textContent = String(chosenD1) + String(chosenD2);
        }

        /* =========================================================
           RESULT
           ========================================================= */
        async function showResult(result, won) {
            const chosen = String(chosenD1) + String(chosenD2);
            document.getElementById('result-badge').textContent = result;
            document.getElementById('result-badge').className = 'result-badge ' + (won ? 'win' : 'lose');

            if (won) {
                const winAmt = betAmount * PAYOUT;
                document.getElementById('result-title').textContent = '🎉 ¡GANASTE!';
                document.getElementById('result-sub').textContent = `Tu número ${chosen} era el correcto`;
                document.getElementById('result-win-amount').textContent = `+${winAmt} 🪙 Bits`;
                playWin();
                fetch('/api/loto/result', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ win_amount: winAmt })
                }).then(r => r.json()).then(d => { if (d.bits !== undefined) { bits = d.bits; updateBitsDisplay(); } });
                addHistory(result, true);
            } else {
                document.getElementById('result-title').textContent = 'Sin suerte esta vez';
                document.getElementById('result-sub').textContent = `Elegiste ${chosen} · Salió ${result}`;
                document.getElementById('result-win-amount').textContent = '';
                playLose();
                addHistory(result, false);
            }
            hideStatus();
            document.getElementById('result-overlay').classList.add('visible');
        }

        function addHistory(result, won) {
            history.unshift({ result, won });
            if (history.length > 5) history.pop();
            renderHistory();
        }
        function renderHistory() {
            const el = document.getElementById('history-strip');
            el.innerHTML = history.map(h => `<div class="history-item${h.won ? ' won' : ''}">${h.result}</div>`).join('');
        }

        function resetGame() {
            state = 'IDLE';
            mixTimer = 0;
            document.getElementById('result-overlay').classList.remove('visible');
            document.getElementById('digit-display').classList.remove('visible');
            document.getElementById('digit-1').textContent = '?';
            document.getElementById('digit-2').textContent = '?';
            document.getElementById('digit-1').classList.remove('lit');
            document.getElementById('digit-2').classList.remove('lit');
            document.getElementById('play-btn').disabled = false;

            // Rebuild balls
            buildSphereGroups();
        }

        /* =========================================================
           PLAY LOGIC
           ========================================================= */
        async function startGameWithWonFlag() {
            if (state !== 'IDLE') return;
            const chosen = String(chosenD1) + String(chosenD2);
            const response = await fetch('/api/loto/play', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ bet: betAmount, chosen })
            });
            const data = await response.json();
            if (data.status !== 'ok') {
                showStatus(data.message || 'Error', 2500);
                return;
            }

            winningResult = data.result;
            winD1 = parseInt(winningResult[0]);
            winD2 = parseInt(winningResult[1]);
            data_won = data.won;
            bits = data.bits;
            updateBitsDisplay();

            document.getElementById('play-btn').disabled = true;
            document.getElementById('digit-1').textContent = '?';
            document.getElementById('digit-2').textContent = '?';
            document.getElementById('digit-display').classList.remove('visible');
            document.getElementById('digit-1').classList.remove('lit');
            document.getElementById('digit-2').classList.remove('lit');

            state = 'MIXING';
            mixTimer = 0;
            playMotor(true);
            showStatus('🎱 Mezclando bolas...', 0);

            // Reset sphere groups fresh for this round
            buildSphereGroups();
        }

        /* =========================================================
           UI EVENTS
           ========================================================= */
        document.getElementById('d1-up').addEventListener('click', () => { chosenD1 = (chosenD1 + 1) % 10; document.getElementById('d1-val').textContent = chosenD1; updateChosenDisplay(); });
        document.getElementById('d1-down').addEventListener('click', () => { chosenD1 = (chosenD1 + 9) % 10; document.getElementById('d1-val').textContent = chosenD1; updateChosenDisplay(); });
        document.getElementById('d2-up').addEventListener('click', () => { chosenD2 = (chosenD2 + 1) % 10; document.getElementById('d2-val').textContent = chosenD2; updateChosenDisplay(); });
        document.getElementById('d2-down').addEventListener('click', () => { chosenD2 = (chosenD2 + 9) % 10; document.getElementById('d2-val').textContent = chosenD2; updateChosenDisplay(); });

        document.getElementById('bet-chips').addEventListener('click', e => {
            const btn = e.target.closest('.chip-btn');
            if (!btn || state !== 'IDLE') return;
            document.querySelectorAll('.chip-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            betAmount = parseInt(btn.dataset.amount);
            document.getElementById('bet-label').textContent = betAmount;
        });

        document.getElementById('play-btn').addEventListener('click', () => {
            if (state !== 'IDLE') return;
            data_won = false;
            startGameWithWonFlag();
        });

        document.getElementById('result-play-again').addEventListener('click', resetGame);

        /* =========================================================
           BOOT
           ========================================================= */
        onResize();
        buildStars();
        buildSphereGroups();
        rafId = requestAnimationFrame(frame);
    </script>
</body>

</html>
