<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"

    <meta name="theme-color" content="#050505">
    <title>Plinko Luxury Cyberpunk | Casino Online Luxury</title>
    <meta name="description" content="Plinko Premium — Casino Online Luxury. El juego de la pirámide renovado con estética Cyberpunk y premios de lujo.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Montserrat:wght@400;500;600;700&display=swap"

    <style>
        /* ===================== VARIABLES ===================== */
        :root {
            --gold-1: #f8e594;
            --gold-2: #c9a227;
            --gold-3: #a67c00;
            --gold-glow: rgba(201, 162, 39, 0.35);
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff00f7;
            --neon-glow: rgba(0, 243, 255, 0.4);
            --bg-dark: #050505;
            --bg-panel: #0d0d0d;
            --text-main: #f0ecd8;
            --text-muted: #8a8a7a;
            --border-gold: rgba(201, 162, 39, 0.3);
            --border-neon: rgba(0, 243, 255, 0.2);
            --font-head: 'Cinzel', serif;
            --font-body: 'Montserrat', sans-serif;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ===================== RESET & BASE ===================== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            font-family: var(--font-body);
            background: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        /* ===================== LAYOUT ===================== */
        #game-container {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 50% 30%, #1a1a2e 0%, var(--bg-dark) 80%);
            position: relative;
        }

        /* HUD */
        #hud {
            position: relative;
            z-index: 50;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 15px 20px;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.8) 0%, transparent 100%);
        }

        #hud-back {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-decoration: none;
            padding: 8px 16px;
            border: 1px solid var(--border-gold);
            border-radius: 20px;
            transition: all var(--transition);
        }

        #hud-back:hover {
            color: var(--gold-1);
            border-color: var(--gold-2);
            box-shadow: 0 0 15px var(--gold-glow);
        }

        #hud-credits {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-head);
            font-size: 1.1rem;
            color: var(--gold-1);
            text-shadow: 0 0 15px var(--gold-glow);
        }

        /* MAIN GAME AREA */
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 10px;
            overflow: hidden;
        }

        canvas {
            max-width: 100%;
            max-height: 80%;
            filter: drop-shadow(0 0 20px rgba(0, 0, 0, 0.5));
        }

        /* CONTROL PANEL */
        #control-panel {
            background: rgba(13, 13, 13, 0.95);
            backdrop-filter: blur(10px);
            border-top: 2px solid var(--border-gold);
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            z-index: 100;
        }

        @media (max-width: 768px) {
            #control-panel {
                grid-template-columns: 1fr;
                padding: 15px;
            }
        }

        .panel-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .label {
            font-family: var(--font-head);
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: var(--gold-2);
            text-transform: uppercase;
        }

        /* RISK SELECTOR */
        .btn-group {
            display: flex;
            gap: 5px;
        }

        .btn-toggle {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border-gold);
            background: rgba(201, 162, 39, 0.05);
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition);
            border-radius: 4px;
        }

        .btn-toggle.active {
            background: linear-gradient(135deg, var(--gold-2), var(--gold-1));
            color: #111;
            border-color: var(--gold-1);
            box-shadow: 0 0 15px var(--gold-glow);
        }

        .btn-toggle[data-risk="low"].active { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; border-color: #2ecc71; }
        .btn-toggle[data-risk="med"].active { background: linear-gradient(135deg, #f39c12, #f1c40f); color: #111; border-color: #f1c40f; }
        .btn-toggle[data-risk="high"].active { background: linear-gradient(135deg, #c0392b, #e74c3c); color: white; border-color: #e74c3c; }

        /* ROWS SLIDER */
        #rows-display {
            color: var(--gold-1);
            font-weight: 700;
            float: right;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--gold-1);
            border: 2px solid var(--gold-3);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--gold-glow);
        }

        /* BETTING AREA */
        .bet-input-wrap {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-gold);
            border-radius: 8px;
            padding: 5px 10px;
        }

        #bet-amount {
            background: transparent;
            border: none;
            color: var(--gold-1);
            font-family: var(--font-head);
            font-size: 1.1rem;
            width: 100%;
            text-align: center;
            outline: none;
        }

        .btn-bet-mod {
            background: transparent;
            border: none;
            color: var(--gold-2);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 10px;
        }

        /* ACTION BUTTONS */
        #drop-button {
            background: linear-gradient(135deg, #b8860b, #c9a227, #f8e594);
            color: #111;
            font-family: var(--font-head);
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: 3px;
            padding: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 6px 25px rgba(201, 162, 39, 0.5);
            transition: all var(--transition);
            text-transform: uppercase;
        }

        #drop-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 35px rgba(201, 162, 39, 0.7);
        }

        #drop-button:active {
            transform: translateY(-1px);
        }

        #drop-button:disabled {
            filter: grayscale(0.8);
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* HISTORY */
        #history-sidebar {
            position: absolute;
            right: 20px;
            top: 100px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }

        .history-item {
            width: 50px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(13, 13, 13, 0.8);
            border: 1px solid var(--border-neon);
            border-radius: 15px;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--neon-cyan);
            animation: slideInRight 0.3s ease-out;
        }

        @keyframes slideInRight {
            from { transform: translateX(50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* UTILS */
        .hidden { display: none !important; }

    </style>
</head>

<body>

</body>
