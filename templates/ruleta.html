<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>Ruleta Francesa | Casino Premium</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Montserrat:wght@400;600;700&display=swap"
    rel="stylesheet">

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="/static/css/ruleta/style.css">
  <link rel="stylesheet" href="/static/css/perfil.css">

  <!-- Global Script Managers -->
  <script src="/static/js/soundManager.js"></script>
  <script defer src="/static/js/perfil.js"></script>

  <script>
    window.USER_BITS = parseInt("{{ bits }}") || 0;
    window.USER_DATA = { telegram_id: "{{ telegram_id }}", bits: window.USER_BITS };
    window.Telegram.WebApp.ready();
    window.Telegram.WebApp.expand();
  </script>
</head>

<body>

  <!-- FONDO AMBIENTAL PREMIUM -->
  <div class="rlt-dynamic-bg"></div>

  <!-- HEADER -->
  <header class="rlt-header">
    <a href="/" class="rlt-back">← Lobby</a>
    <div class="rlt-title">🎡 Ruleta Francesa</div>
    <div style="display:flex; align-items:center; z-index:100;">
      {% include 'user_menu.html' %}
    </div>
  </header>

  <!-- MAIN LAYOUT -->
  <main class="rlt-main">

    <!-- CANVAS DE LA RUEDA -->
    <section class="rlt-wheel-section">
      <div class="rlt-canvas-wrap">
        <canvas id="ruletaCanvas"></canvas>
      </div>

      <!-- Resultado -->
      <div id="resultado" class="rlt-resultado">¡Haz tu apuesta y gira!</div>

      <!-- Historial -->
      <div class="rlt-history-wrap">
        <span class="rlt-history-label">Recientes</span>
        <div id="historyList" class="rlt-history-list"></div>
      </div>
    </section>

    <!-- PANEL DE APUESTAS -->
    <section class="rlt-bets-panel">

      <!-- 💰 BITS HUD — Contador principal siempre visible -->
      <div class="rlt-bits-hud" id="rlt-bits-hud">
        <span class="rlt-bits-hud-icon">💰</span>
        <span class="rlt-bits-hud-label">Saldo</span>
        <span class="rlt-bits-hud-value" id="rlt-bits-display">{{bits}}</span>
        <span class="rlt-bits-hud-unit">Bits</span>
      </div>

      <!-- Fichas -->
      <div class="rlt-ficha-row">
        <span class="rlt-section-label">Ficha</span>
        <div class="rlt-fichas">
          <button class="ficha-btn" data-valor="5" title="5 Bits">
            <img src="/static/img/chip_5.png" alt="5 Bits" class="ficha-img">
          </button>
          <button class="ficha-btn active" data-valor="10" title="10 Bits">
            <img src="/static/img/chip_10.png" alt="10 Bits" class="ficha-img">
          </button>
          <button class="ficha-btn" data-valor="25" title="25 Bits">
            <img src="/static/img/chip_25.png" alt="25 Bits" class="ficha-img">
          </button>
          <button class="ficha-btn" data-valor="50" title="50 Bits">
            <img src="/static/img/chip_50.png" alt="50 Bits" class="ficha-img">
          </button>
          <button class="ficha-btn" data-valor="100" title="100 Bits">
            <img src="/static/img/chip_100.png" alt="100 Bits" class="ficha-img">
          </button>
        </div>
      </div>

      <!-- Apuestas clásicas -->
      <div class="rlt-apuestas-grid">
        <button class="apuesta-btn" data-tipo="rojo">🔴 Rojo <small>×2</small></button>
        <button class="apuesta-btn" data-tipo="negro">⚫ Negro <small>×2</small></button>
        <button class="apuesta-btn" data-tipo="par">Par <small>×2</small></button>
        <button class="apuesta-btn" data-tipo="impar">Impar <small>×2</small></button>
        <button class="apuesta-btn" data-tipo="pasa">19-36 <small>×2</small></button>
        <button class="apuesta-btn" data-tipo="falta">1-18 <small>×2</small></button>
      </div>

      <!-- Números directos -->
      <div class="rlt-numeros-header">Número directo — Pleno <small>×35</small></div>
      <div id="numerosGrid" class="rlt-numeros-grid"></div>

      <!-- 💰 POZO DE APUESTAS (Chip Pot) -->
      <div id="rlt-pot" class="rlt-pot">
        <div class="rlt-pot-label">Apuesta Total</div>
        <div class="rlt-pot-visual">
          <div id="rlt-pot-chips" class="rlt-pot-chips"></div>
        </div>
        <div id="rlt-pot-total" class="rlt-pot-total">—</div>
      </div>

      <!-- Botones de control -->
      <div class="rlt-ctrl-row">
        <button id="repeatBet" class="rlt-ctrl-btn secondary">↺ Repetir</button>
        <button id="spinBtn" class="rlt-ctrl-btn primary">🎡 Girar</button>
        <button id="doubleBet" class="rlt-ctrl-btn secondary">×2 Doblar</button>
      </div>

    </section>

  </main>

  <footer class="rlt-footer">© <span id="anio"></span> Casino Estrella</footer>

  <!-- ÚNICO SCRIPT consolidado -->
  <script src="/static/js/ruleta/script.js"></script>

  <!-- ================= PROFILE MODAL ================= -->
  <div id="profile-modal" class="modal-overlay hidden">
    <div class="modal-content profile-content">
      <header class="modal-header">
        <h2 style="color: #c9a227;">Perfil del Jugador</h2>
        <button class="btn-close" onclick="UserProfileManager.closeModal()">×</button>
      </header>
      <div class="modal-body" id="profile-content-area">
        <!-- Inyectado dinámicamente -->
      </div>
    </div>
  </div>

</body>

</html>
