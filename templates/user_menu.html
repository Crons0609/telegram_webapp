<!-- ==========================================
     GLOBAL ELITE USER MENU (Direct Modal Trigger)
=========================================== -->
{% if global_profile %}
<div class="elite-menu-container">
    <!-- Mode Toggle (Removed per cleanup request) -->    <!-- Notifications Bell (Removed per cleanup request) -->    <!-- Trigger Button - Opens Modal Directly -->
    <button class="elite-menu-btn" type="button" onclick="UserProfileManager.openModal('info')">
        <!-- Avatar Wrapper with Frame -->
        <div class="elite-avatar-wrap avatar-wrapper">
            <div class="avatar-frame frame-{{ global_profile.avatar_frame }}"></div>

            {% if global_profile.photo_url %}
            <img src="{{ global_profile.photo_url }}" alt="Avatar" class="elite-avatar-img">
            {% else %}
            <div class="elite-avatar-img placeholder">👤</div>
            {% endif %}
        </div>

        <!-- Quick Info -->
        <div class="elite-quick-info">
            <span class="elite-name">{{ global_profile.nombre }}</span>
            <span class="elite-rank">{{ global_profile.rank.icon }} Nivel {{ global_profile.progress.level }}</span>
        </div>
    </button>
</div>

<!-- Apply XP bar width via JS (avoids CSS-parser lint errors on Jinja template syntax) -->
<script>
    (function () {
        var fill = document.getElementById('elite-xp-fill');
        if (fill) fill.style.width = (fill.dataset.percent || 0) + '%';
    })();
</script>

{% else %}
<button class="btn-outline" type="button" data-action="login">
    Iniciar en Telegram
</button>
{% endif %}
